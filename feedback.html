<script>
let feedbackType = 'bug';

function openFeedback() {
  closeSettings();
  document.getElementById('feedbackModal').classList.add('open');
  document.getElementById('feedbackText').value = '';
  document.getElementById('feedbackCharCount').textContent = '0 / 300 characters';
  setFeedbackType('bug');

  // Live character counter
  document.getElementById('feedbackText').oninput = function() {
    const len = Math.min(this.value.length, 300);
    this.value = this.value.slice(0, 300);
    document.getElementById('feedbackCharCount').textContent = len + ' / 300 characters';
    document.getElementById('feedbackCharCount').style.color = len >= 280 ? '#ff4444' : 'var(--dim)';
  };
}

function closeFeedback() {
  document.getElementById('feedbackModal').classList.remove('open');
}

function setFeedbackType(type) {
  feedbackType = type;
  ['bug','idea','other'].forEach(t => {
    document.getElementById('fbType' + t.charAt(0).toUpperCase() + t.slice(1))
      .classList.toggle('active', t === type);
  });
}

function submitFeedback() {
  const text = document.getElementById('feedbackText').value.trim();
  if (!text) {
    showNotif('PLEASE WRITE SOMETHING FIRST!');
    return;
  }

  // Save feedback to localStorage (history of all submitted feedback)
  const feedbackLog = JSON.parse(localStorage.getItem('cm_feedback') || '[]');
  feedbackLog.push({
    type: feedbackType,
    message: text,
    date: new Date().toISOString(),
    points: Math.floor(state.points),
    prestige: state.prestigeCount,
  });
  localStorage.setItem('cm_feedback', JSON.stringify(feedbackLog));

  closeFeedback();
  showNotif('✓ FEEDBACK SAVED — THANKS!', 'gold');
}
</script>

<!--
  ════════════════════════════════════════════════════════════════
  NOTE: Feedback is stored locally in localStorage under the key
  "cm_feedback". To send it to a real server, replace the
  localStorage.setItem block in submitFeedback() with a fetch()
  POST to your own endpoint, e.g.:

    await fetch('https://your-server.com/feedback', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ type: feedbackType, message: text })
    });
